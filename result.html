<!DOCTYPE html>
<html>

<head>

<title>AI Result</title>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container">

<h1>🤖 AI Task Report</h1>

<p class="subtitle">

Generated by Gemini AI

</p>

<div class="info">

<p>📝 <b>Task :</b> {{ task }}</p>

<p>📅 <b>Deadline :</b> {{ deadline }}</p>

<p>

<b>⚡ Priority :</b>

<span class="priority">

{{ priority }}

</span>

</p>

</div>

<div class="result-card">

{{ response|safe }}

</div>

</div>

</body>

</html>
