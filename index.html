<!DOCTYPE html>
<html>

<head>

    <title>TaskPilot AI</title>

    <link rel="stylesheet" href="{{ url_for('static',filename='style.css') }}">

</head>

<body>

<div class="container">

<h1>🚀 TaskPilot AI</h1>

<p class="tagline">
    Your Smart AI Productivity Assistant
</p>

<p class="subtitle">
    Plan Smarter • Work Faster • Finish Before Deadline
</p>

<form action="/analyze" method="POST">

<label>📝 Task Name</label>

<input
type="text"
name="task"
placeholder="Enter your task"
required>

<label>📅 Deadline</label>

<input
type="date"
name="deadline"
required>

<label>⚡ Priority</label>

<select name="priority">

<option>High</option>
<option>Medium</option>
<option>Low</option>

</select>

<button type="submit">

✨ Analyze Task with Gemini AI

</button>
<div id="loading">

🤖 AI is thinking...

</div>

</form>
<form id="taskForm" action="/analyze" method="POST"></form>

</div>

<footer>

Made with ❤️ using Flask + Gemini AI

</footer>
<script>

document
.getElementById("taskForm")
.addEventListener("submit",function(){

document
.getElementById("loading")
.style.display="block";

});

</script>
</body>

</html>
